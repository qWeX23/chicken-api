services:
  phoenix:
    container_name: phoenix
    image: arizephoenix/phoenix@sha256:83dd4a52a9a5730756e4bc226221f42d338bcaec5fc21e1f38a7fe491fad5428
    restart: unless-stopped
    ports:
      - "${PHOENIX_PORT:-6006}:6006"
    networks:
      - shared

  chicken-api:
    container_name: chicken-api
    image: chicken-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    restart: unless-stopped
    ports:
      - "${CHICKEN_API_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/google-credentials.json
      KOOG_OLLAMA_BASE_URL: ${KOOG_OLLAMA_BASE_URL:-${KOOG_AGENT_BASE_URL:-http://ollama:11434}}
      KOOG_OLLAMA_WEB_TOOLS_BASE_URL: ${KOOG_OLLAMA_WEB_TOOLS_BASE_URL:-https://ollama.com}
      KOOG_OLLAMA_API_KEY: ${KOOG_OLLAMA_API_KEY:-${KOOG_AGENT_API_KEY:-${OLLAMA_API_KEY:-}}}
      KOOG_AGENT_MODEL: ${KOOG_AGENT_MODEL:-gpt-oss:120b-cloud}
      KOOG_TRACING_PHOENIX_ENABLED: ${KOOG_TRACING_PHOENIX_ENABLED:-true}
      KOOG_TRACING_PHOENIX_VERBOSE: ${KOOG_TRACING_PHOENIX_VERBOSE:-true}
      PHOENIX_COLLECTOR_ENDPOINT: ${PHOENIX_COLLECTOR_ENDPOINT:-http://phoenix:6006/v1/traces}
      PHOENIX_PROJECT_NAME: ${PHOENIX_PROJECT_NAME:-chicken-api}
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS_FILE:?Set GOOGLE_APPLICATION_CREDENTIALS_FILE}:/run/secrets/google-credentials.json:ro
    networks:
      - shared
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8080/actuator/health > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    stop_grace_period: 30s

networks:
  shared:
    external: true
    name: shared
